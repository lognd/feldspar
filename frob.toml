check_base = "main"
# feldspar is a mixed pyo3-library repo (Cargo.toml at root + python/): frob
# auto-detects a single check type per invocation and Cargo.toml wins, so
# `frob check .` alone would silently skip the entire Python stage (ruff/
# ty/gates/exports/...). Pin to python here since that is where the gates
# obligations (COV/TEST/DRIFT/SCOPE) and the bulk of the annotatable
# surface live; feldspar's own `make check` continues to run the Rust
# stage (cargo check/clippy/fmt/test) separately -- see README/Makefile.
check_type = "python"

[graph]
exclude = [
    "target/**",
    ".venv/**",
    "htmlcov/**",
    ".idea/**",
    ".feldspar/**",
    "keys/**",
    "fixtures/**",
    "examples/lithos/**",
    ".import_linter_cache/**",
    "python/feldspar/_feldspar*",
]

[gates.severity]
# Ratchet stage 1 (2026-07-19): the annotation surface reached zero
# (frob check 0 unwaived violations), so the structural coverage rules
# flip to hard errors -- a new public symbol without doc/test edges now
# fails the build. Count- and coverage-flow-dependent rules stay warn
# (environment-sensitive; T-0014 tracks the coverage backfill).
COV001 = "error"
TEST001 = "error"
TEST002 = "warn"
TEST003 = "error"
TEST005 = "warn"
TEST006 = "warn"
DOC001 = "error"

[gates.docs]
# T-0006 retrofit (2026-07-19): docs/spec and docs/workflow (spec/,
# spec/toolchain/, workflow/, workflow/work-orders/ -- 43 files) got a
# real markdown-link index (docs/README.md "File index" section +
# docs/workflow/README.md "Work order index" section) so every doc is
# reachable from the repo's two root docs, same as
# docs/modules/*.md already was via frob:describes anchors. DOC001 is
# now the default include glob at error severity, matching the
# lithos/graphite ratchet (see [gates.severity] above) -- no more
# blanket disable. `docs/README.md` is not literally `docs/index.md`
# (frob's built-in default root), so it is named explicitly in `roots`
# alongside the repo `README.md`.
include = ["docs/**/*.md"]
roots = ["docs/README.md", "README.md"]

[testing]
min_unit_cases = 1
min_integration = 1
# Floors record MEASURED reality (T-0004, 2026-07-18 `make coverage` run:
# overall line-rate 83.6%, branch-rate 72.5% -- see coverage.xml), not an
# aspiration -- frob doctrine per CLAUDE.md "floors in config are reviewed
# commits, raising them is a deliberate follow-up". The bulk of the
# per-function gap sits in fea/elec tool-backed code paths (ccx/gmsh/
# ngspice subprocess wrappers: find_ccx, run_ccx, probe_tools,
# build_cantilever_mesh/build_cylinder_mesh, register()s that branch on
# tool presence) whose failure/degrade-gracefully branches cannot be
# exercised without the real external binary, absent from this sandbox
# (same AD-12e posture as the `fea`/`spice` pytest markers). Lowered from
# 90/85/80 to the measured, achievable-without-those-binaries levels;
# raising them back is a deliberate follow-up once a ccx/gmsh/ngspice-
# equipped CI leg exists (T-0002 done report tracks this).
unit_branch_cov = 60
module_line_cov = 75
system_line_cov = 70

[[test.runner]]
language = "python"
command = ["uv", "run", "pytest", "-q", "{ids}"]
all_command = ["uv", "run", "pytest", "tests/", "-n", "auto", "-m", "not regolith and not fea and not spice"]
cwd = "."

[[test.runner]]
# Wired for when `check_type` gains multi-language gates support (see
# FROBLEMS.md 2026-07-18): `check_type = "python"` above currently gates
# which runner(s) the gates stage consults, so this entry does not yet
# make Rust `frob:tests`/`// frob:tests` bindings collectible -- kept
# here so `frob test`/`cargo test` wiring is ready the moment that
# changes, mirroring lithos's frob.toml.
language = "rust"
command = ["cargo", "test", "--workspace", "{filters}"]
all_command = ["cargo", "test", "--workspace"]
cwd = "."

[check]
# ruff (check + format) and ty (`make typecheck` == `uv run ty check
# python/`) both pass clean as of 2026-07-19 (T-0005): the ruff findings
# were 105 errors, all but 12 of which were frob:waive/frob:tests
# directive comments tripping E501 (fixed via a python/feldspar/**
# per-file-ignore, matching the precedent tests/** already carried);
# the remaining 12 (8 B018 useless-attribute-access in examples/,
# 2 E402 in scripts/gen_keys.py -- same house-style docstring-after-
# future-import pattern python/feldspar/** already ignores, 2 I001)
# were fixed for real. ty against python/ (the Makefile's typecheck
# scope) is 0 diagnostics; ty against the WHOLE repo (tests/ included)
# still has ~254 PyO3-stub/gradual-typing diagnostics, but tests/ was
# never in scope for typecheck (see Makefile's `typecheck` target).
# import-linter and cargo/rust tooling are not wired into frob's check
# stages; feldspar drives those via `make check`/`make import-lint`
# separately.
